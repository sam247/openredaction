# openredaction-site

name: Build
description: Checkout, install Bun, setup Node, and install dependencies with frozen lockfile

inputs:
  fetch-depth:
    description: Checkout fetch depth
    required: false
    default: '1'

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
    - name: Build packages
      shell: bash
      run: bunx turbo run build --filter='!openredaction-site'
