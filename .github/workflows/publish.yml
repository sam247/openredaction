name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        working-directory: ./packages/core

      - name: Build package
        run: npm run build
        working-directory: ./packages/core

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Published version: $VERSION"

      - name: Verify version matches package.json
        run: |
          TAG_VERSION="${{ steps.get_version.outputs.version }}"
          PACKAGE_VERSION=$(node -p "require('./packages/core/package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi
          echo "Version match confirmed: $TAG_VERSION"

      - name: Configure npm auth for publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Write at repo root: npm ignores .npmrc inside workspace packages (packages/core)
          TOKEN=$(printf '%s' "$NPM_TOKEN" | tr -d '\n\r')
          echo "//registry.npmjs.org/:_authToken=$TOKEN" > .npmrc
          echo "registry=https://registry.npmjs.org/" >> .npmrc

      - name: Publish to npm
        run: npm publish --access public
        working-directory: ./packages/core

      # Keeps GitHub “Releases” in sync with npm (tags alone do not create a Release)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

