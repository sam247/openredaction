name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-bun
        with:
          fetch-depth: '0'

      - name: Run tests
        run: bun run test

      - name: Build package
        run: bun run build

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Published version: $VERSION"

      - name: Verify version matches package.json
        run: |
          TAG_VERSION="${{ steps.get_version.outputs.version }}"
          PACKAGE_VERSION=$(node -p "require('./packages/core/package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi
          echo "Version match confirmed: $TAG_VERSION"

      - name: Configure npm auth for publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Write at repo root: npm ignores .npmrc inside workspace packages (packages/core)
          TOKEN=$(printf '%s' "$NPM_TOKEN" | tr -d '\n\r')
          echo "//registry.npmjs.org/:_authToken=$TOKEN" > .npmrc
          echo "registry=https://registry.npmjs.org/" >> .npmrc

      - name: Publish to npm
        run: npm publish --access public
        working-directory: ./packages/core

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
